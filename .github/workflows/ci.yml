name: E2E POM Tests

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout automation repository
        uses: actions/checkout@v4

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: equipo-6-uruguay/infra
          ref: main
          path: infra

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Google Chrome + matching ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Export Chrome binary for Serenity/Selenium
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          echo "GOOGLE_CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> "$GITHUB_ENV"
          echo "${{ steps.setup-chrome.outputs.chrome-path }}" | xargs dirname >> "$GITHUB_PATH"
          echo "${{ steps.setup-chrome.outputs.chromedriver-path }}" | xargs dirname >> "$GITHUB_PATH"

      - name: Show browser/driver versions
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          echo "ChromeDriver path: ${{ steps.setup-chrome.outputs.chromedriver-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Smoke test Chrome headless
        run: |
          "$CHROME_BIN" \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --window-size=1920,1080 \
            --dump-dom about:blank

      - name: Prepare infra environment
        working-directory: infra
        run: cp .env.example .env

      - name: Start application with Docker Compose
        working-directory: infra
        run: docker compose up -d

      - name: Wait for AUT on localhost:3000
        run: |
          for attempt in {1..36}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "AUT is available."
              exit 0
            fi
            echo "Waiting for AUT... (${attempt}/36)"
            sleep 5
          done
          echo "AUT did not become available at http://localhost:3000/"
          exit 1

      - name: Run E2E tests
        run: |
          ./gradlew clean test aggregate \
            -Dwebdriver.driver=chrome \
            -Dwebdriver.chrome.driver="$CHROMEDRIVER_PATH" \
            -Dchrome.binary="$CHROME_BIN" \
            -Dheadless.mode=true \
            -Dchrome.switches="--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080" \
            -Dwebdriver.base.url=http://localhost:3000 \
            --stacktrace --info

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity
          if-no-files-found: warn

      - name: Upload Gradle test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-report
          path: build/reports/tests/test
          if-no-files-found: warn

      - name: Stop Docker Compose services
        if: always()
        working-directory: infra
        run: docker compose down --remove-orphans
