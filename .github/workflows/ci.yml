name: E2E POM Tests

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout automation repository
        uses: actions/checkout@v4

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: equipo-6-uruguay/infra
          ref: main
          path: infra

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Google Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install matching ChromeDriver
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip
          CHROME_VERSION=$("${{ steps.setup-chrome.outputs.chrome-path }}" --version | awk '{print $3}')
          CHROME_MAJOR="${CHROME_VERSION%%.*}"
          DRIVER_VERSION=$(curl -fsSL "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_MAJOR}")
          curl -fsSL -o /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -qo /tmp/chromedriver.zip -d /tmp
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          echo "Chrome version: ${CHROME_VERSION}"
          chromedriver --version

      - name: Prepare infra environment
        working-directory: infra
        run: |
          cp .env.example .env

      - name: Start application with Docker Compose
        working-directory: infra
        run: docker compose up -d

      - name: Wait for AUT on localhost:3000
        run: |
          for attempt in {1..36}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "AUT is available."
              exit 0
            fi
            echo "Waiting for AUT... (${attempt}/36)"
            sleep 5
          done
          echo "AUT did not become available at http://localhost:3000/"
          exit 1

      - name: Run E2E tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          GOOGLE_CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: ./gradlew clean test aggregate -Dwebdriver.driver=chrome -Dwebdriver.chrome.driver=/usr/local/bin/chromedriver -Dheadless.mode=true -Dwebdriver.base.url=http://localhost:3000

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity
          if-no-files-found: warn

      - name: Stop Docker Compose services
        if: always()
        working-directory: infra
        run: docker compose down --remove-orphans
